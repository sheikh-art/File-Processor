type User @table {
  fullName: String!
  email: String!
  role: String!
  phoneNumber: String
  profileImageUrl: String
}

type Group @table {
  name: String!
  type: String!
  creationDate: Timestamp!
  adminUser: User!
  description: String
  maxMembers: Int
}

type Membership @table {
  user: User!
  group: Group!
  joinDate: Timestamp!
  status: String!
}

type Collection @table {
  membership: Membership!
  amount: Float!
  dueDate: Timestamp!
  status: String!
  paymentDate: Timestamp
  referenceNumber: String
}

type Loan @table {
  membership: Membership!
  principalAmount: Float!
  interestRate: Float!
  status: String!
  disbursementDate: Timestamp
  maturityDate: Timestamp
}

type Draw @table {
  group: Group!
  winnerMembership: Membership!
  drawDate: Timestamp!
  prizeAmount: Float
  roundNumber: Int
}